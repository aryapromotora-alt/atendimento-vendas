<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direcionando para o Atendimento...</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f4; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h2>Aguarde um momento...</h2>
    <p>Estamos conectando você ao próximo vendedor disponível.</p>
    <div class="loader"></div>

    <script>
        // 🛑 COLOQUE OS NÚMEROS DOS SEUS VENDEDORES AQUI (Com código do país e DDD)
        const vendedores = [
            "5511976203346", // Vendedor 1
            "5511982494191", // Vendedor 2
            "5511777777777"  // Vendedor 3 (Adicione quantos quiser separados por vírgula)
        ];

        // Mensagem padrão opcional que já vai digitada no texto do cliente
        const mensagemPadrao = encodeURIComponent("Olá! Vim através do anúncio e gostaria de saber mais informações.");

        // Função que escolhe um número de forma aleatória/distribuída
        function redirecionar() {
            const indiceAleatorio = Math.floor(Math.random() * vendedores.length);
            const numeroEscolhido = vendedores[indiceAleatorio];
            
            // Monta o link final do WhatsApp
            const linkWhatsApp = `https://whatsapp.com{numeroEscolhido}&text=${mensagemPadrao}`;
            
            // Faz o redirecionamento automático da página
            window.location.href = linkWhatsApp;
        }

        // Executa o redirecionamento assim que a página carrega
        window.onload = function() {
            setTimeout(redirecionar, 800); // Aguarda 0.8 segundos para dar efeito de carregamento
        };
    </script>
</body>
</html>
