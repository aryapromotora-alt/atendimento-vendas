<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
    <script>
        // 🛑 COLOQUE OS NÚMEROS AQUI (Apenas números, com 55 + DDD, sem espaços ou traços)
        const vendedores = [
            "5511976203346", 
            "5511982494191", 
            "5511777777777"  
            // Adicione até 15 números aqui, separados por vírgula
        ];

        // Mensagem que já vai digitada
        const mensagem = encodeURIComponent("Olá! Vim através do anúncio e gostaria de saber mais informações.");

        function redirecionar() {
            // Escolhe um número aleatório (distribui o tráfego igualmente entre todos ao longo do dia)
            const indice = Math.floor(Math.random() * vendedores.length);
            const numeroEscolhido = vendedores[indice];
            
            // Monta o link oficial do WhatsApp
            const linkWhatsApp = `https://wa.me/${numeroEscolhido}?text=${mensagem}`;
            
            // O 'replace' faz o redirecionamento instantâneo e limpa o histórico, 
            // tornando a página do GitHub totalmente invisível para o usuário.
            window.location.replace(linkWhatsApp);
        }

        // Executa IMEDIATAMENTE ao carregar o menor pedaço de código possível
        redirecionar();
    </script>
</head>
<body>
    <!-- Fallback mínimo apenas por segurança, quase imperceptível -->
    <div style="text-align: center; font-family: Arial, sans-serif; margin-top: 50px; color: #333;">
        <p>Redirecionando para o WhatsApp...</p>
        <p style="font-size: 14px;">
            <a id="link-manual" href="#" style="color: #25D366; text-decoration: none; font-weight: bold;">
                Clique aqui se o WhatsApp não abrir automaticamente.
            </a>
        </p>
    </div>

    <script>
        // Garante que o link manual também funcione com o primeiro número da lista, por segurança
        document.getElementById('link-manual').href = `https://wa.me/${vendedores[0]}?text=${mensagem}`;
    </script>
</body>
</html>
